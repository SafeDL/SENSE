scenario_type_dir: 'safebench/scenario/config/scenario_type'
scenario_type: 'debug_scenario08.json'
scenario_category: 'planning'
policy_type: 'sac'

route_dir: 'safebench/scenario/scenario_data/route'
scenario_id: 8
route_id: null

# parameters for agent policy
ego_action_dim: 2
ego_state_dim: 4
ego_action_limit: 1.0

# parameters for scenario policy
# for scenario id 1
#scenario_state_dim: 27 # 3*9 - actor number * actor info dim
#scenario_action_dim: 1

# for scenario id 8
scenario_state_dim: 18 # 2*9 - actor number * actor info dim
scenario_action_dim: 1

# for SAC policy model
model_path: 'safebench/scenario/scenario_data/model_ckpt/mysac'
model_id: 4
continue_episode: 0
train_episode: 300  # 2000
save_freq: 10
eval_in_train_freq: 10
buffer_capacity: 1000
buffer_start_training: 200
lr: 3.0e-4
tau: 0.005
update_iteration: 1
gamma: 0.99
batch_size: 64
min_Val: 1.0e-7
alpha: 0.2  # 温度控制系数
